<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baalam | MONITOREO DE CLIMA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --baalam-green: #29903B; 
            --baalam-green-hover: #227831;
            --baalam-red: #ef4444; 
            --baalam-blue: #0669FE;
            --baalam-bg: #0f172a;
            --baalam-surface: #1e293b;
            --baalam-border: #334155;
            --baalam-text: #f1f5f9;
            --baalam-text-muted: #94a3b8;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--baalam-bg); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            padding: 0.75rem; 
            display: flex; 
            flex-direction: column;
            color: var(--baalam-text);
        }
        .sidebar { 
            background: var(--baalam-surface); 
            border-right: 1px solid var(--baalam-border); 
            width: 14%; 
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.15);
        }
        .content-panel { 
            background: #ffffff; 
            border-radius: 1rem; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .cedis-card { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 1.25rem; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            padding: 1.25rem; 
            position: relative; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .cedis-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            border-color: #cbd5e1;
        }
        .sparkline-container { 
            position: absolute; 
            inset: 0; 
            top: 28%; 
            bottom: 32%; 
            z-index: 1; 
            pointer-events: none; 
            padding: 0 0.5rem; 
        }
        .timeline-labels { 
            position: absolute; 
            bottom: 28%; 
            left: 0; 
            right: 0; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 0.5rem; 
            z-index: 2; 
            font-size: 0.65rem;
            pointer-events: none;
        }
        .card-header, .card-footer { 
            position: relative; 
            z-index: 10; 
            background: white; 
        }
        .chart-panel { 
            background: #ffffff; 
            border-radius: 1rem; 
            width: 28%; 
            display: flex; 
            flex-direction: column; 
            gap: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }
        #auto-summary { 
            border-top: 1px solid var(--baalam-border); 
            padding-top: 1.25rem; 
            color: var(--baalam-text-muted); 
        }
        .summary-text { 
            font-size: 0.85rem; 
            line-height: 1.6; 
            font-weight: 500; 
        }
        .footer-seal { 
            font-size: 9px; 
            color: #64748b; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            opacity: 0.8;
        }
        .kpi-value { 
            transition: all 0.3s ease; 
        }
        .kpi-value.updated {
            animation: pulse 0.4s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); color: var(--baalam-green); }
            100% { transform: scale(1); }
        }
        .btn-refresh {
            transition: all 0.2s ease;
        }
        .btn-refresh:hover {
            background: var(--baalam-green-hover);
            transform: scale(1.02);
        }
        .btn-refresh:active {
            transform: scale(0.98);
        }
        .status-dot {
            box-shadow: 0 0 0 3px rgba(41, 144, 59, 0.2);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 3px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <div class="flex flex-1 gap-2 overflow-hidden">
        <aside class="sidebar flex flex-col justify-between p-4">
            <div class="space-y-6 text-center">
                <div class="py-3 border-b border-slate-700">
                    <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2">PROMEDIO ACTUAL REGIONAL</div>
                    <div class="text-5xl font-black text-green-400 kpi-value" id="kpiCurrent">--°</div>
                </div>
                <div>
                    <div class="text-[9px] font-bold uppercase tracking-widest mb-2" style="color: var(--baalam-red)">MÁXIMA PROM. REGIONAL</div>
                    <div class="text-6xl font-black kpi-value" id="kpiMax">--°</div>
                </div>
                <div>
                    <div class="text-[9px] font-bold uppercase tracking-widest mb-2" style="color: var(--baalam-blue)">MÍNIMA PROM. REGIONAL</div>
                    <div class="text-6xl font-black kpi-value" id="kpiMin">--°</div>
                </div>

                <div id="auto-summary" class="text-left italic px-1">
                    <p class="font-bold text-slate-400 mb-3 uppercase tracking-tight text-[10px]">Perspectiva Operativa</p>
                    <div id="summary-text" class="summary-text space-y-2 text-slate-300" aria-live="polite">Analizando promedios regionales...</div>
                </div>
            </div>
            <button onclick="cargarClima()" class="btn-refresh w-full py-4 bg-[var(--baalam-green)] text-white rounded-xl font-bold text-xs hover:bg-[var(--baalam-green-hover)] transition-all focus:outline-none focus:ring-2 focus:ring-green-500/50" aria-label="Actualizar datos climáticos">
                <i class="fas fa-sync-alt" id="refreshIcon"></i>
                <span class="sr-only">Actualizar</span>
            </button>
        </aside>

        <section class="content-panel p-4">
            <div class="flex flex-col items-center mb-5 px-2 relative border-b border-slate-100 pb-4">
                <div class="flex items-center gap-3">
                    <span class="w-2 h-2 rounded-full bg-[#29903B] animate-pulse status-dot"></span>
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-[0.15em]">
                        IC <span class="text-slate-300 mx-2 font-light">|</span> MONITOREO DE CLIMA
                    </h2>
                    <span class="w-2 h-2 rounded-full bg-[#29903B] animate-pulse status-dot"></span>
                </div>
                <div class="absolute right-4 top-2">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 shadow-sm" id="lastUpdate">
                        SYNC: --:--
                    </span>
                </div>
            </div>
            <div id="dashboard" class="grid grid-cols-3 gap-4 flex-1 overflow-y-auto pr-2 pb-2"></div>
        </section>

        <aside class="chart-panel">
            <div class="flex-1 p-5 flex flex-col">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 text-center flex items-center justify-center gap-2">
                    <i class="fas fa-chart-line text-slate-300"></i>
                    Tendencia Promedio de Máximas (REGIONAL)
                </p>
                <div class="flex-1 min-h-0"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="flex-1 p-5 border-t border-slate-100 flex flex-col">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 text-center flex items-center justify-center gap-2">
                    <i class="fas fa-balance-scale text-slate-300"></i>
                    Balance Regional
                </p>
                <div class="flex-1 min-h-0"><canvas id="regionalChart"></canvas></div>
            </div>
        </aside>
    </div>

    <footer class="flex justify-center py-2">
        <div class="footer-seal">Source: Open-Meteo Weather API • Powered by Baalam</div>
    </footer>

    <script>
        const config = {
            regiones: {
                'Bajío': [{ ciudad: "León", lat: 21.12, lon: -101.68 }, { ciudad: "Irapuato", lat: 20.67, lon: -101.35 }, { ciudad: "Querétaro", lat: 20.58, lon: -100.38 }],
                'Altos Jalisco': [{ ciudad: "Arandas", lat: 20.70, lon: -102.76 }, { ciudad: "Lagos de Moreno", lat: 21.35, lon: -101.92 }, { ciudad: "Zapotlanejo", lat: 20.62, lon: -103.17 }],
                'Michoacán': [{ ciudad: "Zamora", lat: 19.98, lon: -102.28 }, { ciudad: "La Piedad", lat: 20.33, lon: -102.02 }],
                'Aguascalientes': [{ ciudad: "Aguascalientes", lat: 21.88, lon: -102.29 }]
            }
        };

        const cds = Object.entries(config.regiones).flatMap(([region, cities]) => cities.map(c => ({...c, region})));
        let charts = {};
        const gradientCache = new WeakMap();

        function getCachedGradient(ctx, chartArea, factory) {
            if (!gradientCache.has(ctx.canvas)) {
                gradientCache.set(ctx.canvas, factory(ctx, chartArea));
            }
            return gradientCache.get(ctx.canvas);
        }

        function createThermalGradient(ctx, chartArea) {
            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
            gradient.addColorStop(0, '#0669FE'); 
            gradient.addColorStop(1, '#ef4444');
            return gradient;
        }

        function createThermalFade(ctx, chartArea) {
            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
            gradient.addColorStop(0, 'rgba(6, 105, 254, 0.05)'); 
            gradient.addColorStop(1, 'rgba(239, 68, 68, 0.15)');
            return gradient;
        }

        async function cargarClima() {
            const btn = document.getElementById('refreshIcon');
            const summary = document.getElementById('summary-text');
            const kpis = ['kpiCurrent', 'kpiMax', 'kpiMin'].map(id => document.getElementById(id));
            
            btn.classList.add('fa-spin');
            summary.textContent = 'Actualizando datos...';
            kpis.forEach(k => k.classList.add('opacity-50'));
            
            try {
                const results = await Promise.all(cds.map(async (cd) => {
                    const resp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${cd.lat}&longitude=${cd.lon}&current_weather=true&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`);
                    if (!resp.ok) throw new Error(`API error: ${resp.status}`);
                    return { ...cd, data: await resp.json() };
                }));
                
                const validResults = results.filter(r => 
                    r.data?.daily?.temperature_2m_max?.[0] !== undefined && 
                    !isNaN(r.data.daily.temperature_2m_max[0])
                );
                
                if (validResults.length === 0) {
                    summary.innerHTML = `<p class="text-red-400">⚠️ No se pudieron procesar los datos. Intenta más tarde.</p>`;
                    return;
                }
                
                updateUI(validResults);
                generarResumen(validResults);
                
                kpis.forEach(k => {
                    k.classList.add('updated');
                    setTimeout(() => k.classList.remove('updated'), 400);
                });
                
            } catch (e) { 
                console.error('Error cargando clima:', e); 
                summary.innerHTML = `<p class="text-red-400">⚠️ Error de conexión. Verifica tu red.</p>`;
            } finally { 
                btn.classList.remove('fa-spin'); 
                kpis.forEach(k => k.classList.remove('opacity-50'));
                document.getElementById('lastUpdate').textContent = `SYNC: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`; 
            }
        }

        function generarResumen(results) {
            const sumBox = document.getElementById('summary-text');
            const validMax = results.map(r => r.data.daily.temperature_2m_max[0]).filter(v => !isNaN(v));
            const validMaxTomorrow = results.map(r => r.data.daily.temperature_2m_max[1]).filter(v => !isNaN(v));
            
            if (validMax.length === 0 || validMaxTomorrow.length === 0) {
                sumBox.textContent = 'Datos insuficientes para generar perspectiva.';
                return;
            }
            
            const avgHoy = validMax.reduce((a, b) => a + b, 0) / validMax.length;
            const avgProx = validMaxTomorrow.reduce((a, b) => a + b, 0) / validMaxTomorrow.length;
            const dif = avgProx - avgHoy;
            const lluviaZonas = results.filter(r => r.data?.daily?.precipitation_probability_max?.[0] > 40);

            let html = `<p>El promedio regional proyecta un <span class="${dif >= 0 ? 'text-orange-500' : 'text-blue-500'} font-bold">${dif >= 0 ? 'alza' : 'baja'}</span> de <span class="font-bold">${Math.abs(dif).toFixed(1)}°C</span> para mañana.</p>`;
            html += `<p class="mt-2">Máxima promedio colectiva estimada: <span class="font-bold text-slate-700">${Math.round(avgHoy)}°C</span>.</p>`;
            if (lluviaZonas.length > 0) {
                html += `<p class="mt-2 text-red-500 font-bold flex items-center gap-1"><i class="fas fa-cloud-rain"></i> Inestabilidad en ${lluviaZonas.length} zona${lluviaZonas.length > 1 ? 's' : ''} operativa${lluviaZonas.length > 1 ? 's' : ''}.</p>`;
            } else {
                html += `<p class="mt-2 text-green-600 font-bold flex items-center gap-1"><i class="fas fa-check-circle"></i> Operación sin riesgos de precipitación regional.</p>`;
            }
            sumBox.innerHTML = html;
        }

        function updateUI(results) {
            const validCurrent = results.map(r => r.data.current_weather?.temperature).filter(v => v !== undefined && !isNaN(v));
            const validMax = results.map(r => r.data.daily?.temperature_2m_max?.[0]).filter(v => v !== undefined && !isNaN(v));
            const validMin = results.map(r => r.data.daily?.temperature_2m_min?.[0]).filter(v => v !== undefined && !isNaN(v));
            
            const avgCurrent = validCurrent.length ? validCurrent.reduce((a,b) => a+b, 0) / validCurrent.length : 0;
            const avgMaxToday = validMax.length ? validMax.reduce((a,b) => a+b, 0) / validMax.length : 0;
            const avgMinToday = validMin.length ? validMin.reduce((a,b) => a+b, 0) / validMin.length : 0;

            document.getElementById('kpiCurrent').textContent = Math.round(avgCurrent) + '°';
            document.getElementById('kpiMax').textContent = Math.round(avgMaxToday) + '°';
            document.getElementById('kpiMin').textContent = Math.round(avgMinToday) + '°';
            
            document.getElementById('dashboard').innerHTML = results.map((item, i) => {
                const temp = item.data.current_weather?.temperature ?? 0;
                const maxT = item.data.daily?.temperature_2m_max?.[0] ?? 0;
                const minT = item.data.daily?.temperature_2m_min?.[0] ?? 0;
                const precip = item.data.daily?.precipitation_probability_max?.[0] ?? 0;
                
                return `
                <div class="cedis-card group">
                    <div class="card-header flex justify-between items-start pb-2">
                        <div>
                            <h4 class="font-bold text-slate-700 text-base uppercase leading-tight">${item.ciudad}</h4>
                            <p class="text-[10px] text-slate-400 font-medium">${item.region}</p>
                        </div>
                        <div class="text-3xl font-black text-slate-800">${Math.round(temp)}°</div>
                    </div>
                    <div class="sparkline-container"><canvas id="spark-${i}"></canvas></div>
                    <div class="timeline-labels text-[7px] font-bold text-slate-400 uppercase tracking-wide">
                        <span>00H</span><span>06H</span><span>12H</span><span>18H</span><span>23H</span>
                    </div>
                    <div class="card-footer flex items-end justify-between mt-auto pt-4 border-t border-slate-100">
                        <div class="flex gap-6">
                            <div class="text-center">
                                <div class="text-[9px] text-red-500 font-bold uppercase">Máx</div>
                                <div class="text-3xl font-black text-red-500 leading-none">${Math.round(maxT)}°</div>
                            </div>
                            <div class="text-center">
                                <div class="text-[9px] text-blue-500 font-bold uppercase">Mín</div>
                                <div class="text-3xl font-black text-blue-500 leading-none" style="color: var(--baalam-blue)">${Math.round(minT)}°</div>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold px-2.5 py-1 rounded-full bg-[#29903B]/10 text-[#29903B] border border-[#29903B]/20 uppercase tracking-wide flex items-center gap-1 group-hover:bg-[#29903B] group-hover:text-white transition-colors">
                            <i class="fas fa-tint text-[8px]"></i>${precip}%
                        </span>
                    </div>
                </div>`;
            }).join('');

            results.forEach((item, i) => {
                const ctx = document.getElementById(`spark-${i}`).getContext('2d');
                const hourlyData = item.data.hourly || {};
                
                // CORRECCIÓN LÓGICA: Ciclo diario completo 00:00 - 23:00
                const temps = hourlyData.temperature_2m?.slice(0, 24) || [];
                const currentHour = new Date().getHours();
                
                new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: Array(24).fill('').map((_, h) => {
                            if (h === 0) return '00H';
                            if (h === 6) return '06H';
                            if (h === 12) return '12H';
                            if (h === 18) return '18H';
                            if (h === 23) return '23H';
                            return '';
                        }),
                        datasets: [
                            { 
                                data: temps, 
                                fill: true,
                                borderColor: (c) => c.chart.chartArea ? getCachedGradient(c.chart.ctx, c.chart.chartArea, createThermalGradient) : '#ef4444',
                                backgroundColor: (c) => c.chart.chartArea ? getCachedGradient(c.chart.ctx, c.chart.chartArea, createThermalFade) : 'transparent',
                                borderWidth: 2.5, 
                                pointRadius: 0, 
                                tension: 0.4,
                                segment: {
                                    borderColor: ctx => {
                                        const p0 = ctx.p0.parsed.y, p1 = ctx.p1.parsed.y;
                                        const mid = (p0 + p1) / 2;
                                        if (mid < 18) return '#3b82f6';
                                        if (mid < 25) return '#f59e0b';
                                        return '#ef4444';
                                    }
                                }
                            },
                            {
                                // Marcador "AHORA"
                                data: temps.map((_, h) => h === currentHour ? temps[h] : null),
                                borderColor: '#29903B',
                                backgroundColor: '#fff',
                                pointRadius: 5,
                                pointHoverRadius: 7,
                                pointBorderWidth: 2,
                                pointBorderColor: '#29903B',
                                fill: false,
                                tension: 0,
                                pointStyle: 'circle'
                            }
                        ] 
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { 
                            legend: { display: false },
                            tooltip: {
                                enabled: true,
                                backgroundColor: 'rgba(15, 23, 42, 0.95)',
                                titleColor: '#fff',
                                bodyColor: '#cbd5e1',
                                padding: 10,
                                displayColors: false,
                                callbacks: {
                                    title: (ctx) => {
                                        const h = new Date().getHours();
                                        return ctx[0].label || `${h}:00`;
                                    },
                                    label: (ctx) => ` ${ctx.parsed.y.toFixed(1)}°C`
                                }
                            }
                        }, 
                        scales: { 
                            x: { 
                                display: true,
                                grid: { display: false },
                                ticks: { color: '#94a3b8', font: { size: 8, weight: '600' }, maxRotation: 0, autoSkip: false },
                                border: { display: false }
                            }, 
                            y: { display: false, min: 10, max: 40 } 
                        }
                    }
                });
            });
            updateMainCharts(results);
        }

        function updateMainCharts(results) {
            // === GRÁFICO DE TENDENCIA (Eje Y fijo 15°–40°) ===
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            const firstValid = results.find(r => r.data?.daily?.time);
            if (!firstValid) return;
            
            const days = firstValid.data.daily.time.length;
            const avgMax7Days = [];
            for (let idx = 0; idx < days; idx++) {
                const valid = results.map(r => r.data.daily?.temperature_2m_max?.[idx]).filter(v => v !== undefined && !isNaN(v));
                avgMax7Days.push(valid.length ? valid.reduce((a,b) => a+b, 0) / valid.length : null);
            }

            if(charts.trend) charts.trend.destroy();
            charts.trend = new Chart(ctxTrend, {
                type: 'line',
                data: { 
                    labels: firstValid.data.daily.time.map(t => new Date(t).toLocaleDateString('es-MX', {weekday: 'short'})).map(d => d.replace('.', '')), 
                    datasets: [{ 
                        data: avgMax7Days, 
                        fill: true,
                        borderColor: (c) => c.chart.chartArea ? getCachedGradient(c.chart.ctx, c.chart.chartArea, createThermalGradient) : '#0669FE',
                        backgroundColor: (c) => c.chart.chartArea ? getCachedGradient(c.chart.ctx, c.chart.chartArea, createThermalFade) : 'transparent',
                        borderWidth: 4, 
                        tension: 0.4,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#0669FE',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            callbacks: { label: (ctx) => ` Máx. prom: ${ctx.parsed.y?.toFixed(1) || '--'}°C` }
                        }
                    },
                    scales: {
                        y: {
                            min: 15,
                            max: 40,
                            ticks: {
                                callback: (v) => v + '°',
                                color: '#64748b',
                                font: { size: 10, weight: '600', family: 'Inter' },
                                stepSize: 5
                            },
                            grid: { color: 'rgba(148, 163, 184, 0.12)', drawBorder: false },
                            border: { display: false }
                        },
                        x: {
                            grid: { display: false },
                            border: { display: false },
                            ticks: { color: '#64748b', font: { size: 9, weight: '500' } }
                        }
                    }
                }
            });

            // === GRÁFICO DE BALANCE REGIONAL ===
            const ctxReg = document.getElementById('regionalChart').getContext('2d');
            const regLabels = Object.keys(config.regiones);
            const regData = regLabels.map(reg => {
                const group = results.filter(r => r.region === reg);
                const valid = group.map(r => r.data.daily?.temperature_2m_max?.[0]).filter(v => v !== undefined && !isNaN(v));
                return valid.length ? valid.reduce((a,b) => a+b, 0) / valid.length : null;
            });

            if(charts.regional) charts.regional.destroy();
            charts.regional = new Chart(ctxReg, {
                type: 'bar',
                data: { 
                    labels: regLabels, 
                    datasets: [{ 
                        data: regData, 
                        backgroundColor: (ctx) => {
                            const v = ctx.parsed.y;
                            if (v < 25) return '#3b82f6';
                            if (v < 32) return '#29903B';
                            return '#ef4444';
                        },
                        borderRadius: 8, 
                        borderSkipped: false,
                        borderWidth: 0,
                        hoverBackgroundColor: '#0f172a',
                        hoverBorderWidth: 2,
                        hoverBorderColor: '#64748b'
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.95)', callbacks: { label: (ctx) => ` Máx. prom: ${ctx.parsed.y?.toFixed(1) || '--'}°C` } }
                    },
                    scales: {
                        y: {
                            min: 15,
                            max: 40,
                            ticks: { callback: (v) => v + '°', color: '#64748b', font: { size: 9 } },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' }
                        },
                        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9, weight: '600' } } }
                    }
                }
            });
        }
        
        document.addEventListener('DOMContentLoaded', cargarClima);
        
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r' && !e.target.matches('input, textarea, [contenteditable]')) {
                e.preventDefault();
                cargarClima();
            }
        });
    </script>
</body>
</html>
